# Netlify Configuration for Smart Pharmacy Workflow Analyzer

[build]
  publish = "."

# Redirects for single page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Identity Configuration
[context.production.environment]
  NETLIFY_SITE_ID = "your-site-id-here"
  NETLIFY_AUTH_TOKEN = "your-auth-token-here"

# Forms configuration (automatically handled by Netlify)
# Forms are detected by the data-netlify="true" attribute in HTML

# Identity configuration (configured in Netlify UI)
# To enable Identity:
# 1. Go to Netlify Dashboard
# 2. Navigate to Site > Identity > Enable Identity
# 3. Configure providers (Google, Email, etc.)
# 4. Set up role-based access control

# Recommended plugins for development
[dev]
  command = ""
  port = 8080
  publish = "."

# Production settings
[context.production]
  command = ""

# Branch deploy settings
[context.deploy-preview]
  command = ""

# Environment variables
[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"

[context.production.environment]
  NODE_ENV = "production"